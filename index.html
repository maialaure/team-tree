<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Our testing tree</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Nunito:wght@400;600;700&display=swap');

  html,body{ margin:0; padding:0; background:#EAE0C8; height:100%; }
  body{ display:flex; justify-content:center; }
  *{ box-sizing:border-box; }

  :root{
    --cream:#F5ECD6; --cream-2:#EFE3C6;
    --ink:#163A2B; --ink-soft:#2C5341;
    --sage:#A2C5A8; --sage-deep:#2e5e3e;
    --orange:#E8821E; --orange-soft:#F0A24A; --orange-deep:#D9761A;
    --gold:#E0A53C;
  }

  #app{
    max-width:560px; width:100%; min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column;
    font-family:'Nunito', ui-sans-serif, system-ui, -apple-system, sans-serif;
    color:var(--ink); text-align:center;
    background:radial-gradient(120% 80% at 50% 8%, #FBF4E2 0%, var(--cream) 55%, var(--cream-2) 100%);
  }
  .screen{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:20px 18px 20px; }
  .screen > header, .screen > #status, .screen > .livenote{ flex:0 0 auto; }

  .eyebrow{ margin:0 0 4px; font-size:1.275rem; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:#B07D52; }
  .title{ margin:0; font-family:'Fraunces','Iowan Old Style','Palatino',Georgia,serif; font-weight:600;
    font-size:clamp(2.25rem, 8.25vw, 3.15rem); line-height:1.05; color:var(--ink); }
  .subtitle{ margin:4px auto 0; max-width:34ch; font-size:1.425rem; color:var(--ink-soft); line-height:1.4; transition:color .4s ease; min-height:6.5rem; }
  .subtitle.final{ font-family:'Fraunces','Iowan Old Style',Georgia,serif; font-weight:600; font-size:1.575rem; line-height:1.35; color:var(--ink); max-width:42ch; }

  .stage{ height:min(68vh,530px); flex:0 0 auto; display:flex; align-items:center; justify-content:center; margin:64px 0 2px; overflow:hidden; }
  #tree{ width:100%; height:100%; min-height:0; display:block; overflow:visible; }

  /* hidden -> shown */
  .leaf-pop, .deco, .ray, .blossom, .sun-core, .seedling{
    transform:scale(0); transform-box:fill-box; transform-origin:var(--ox,50%) var(--oy,100%); opacity:0;
  }
  .deco, .ray, .sun-core{ transform-box:view-box; }
  .branch{ stroke-dasharray:var(--len); stroke-dashoffset:var(--len); opacity:0; }

  @media (prefers-reduced-motion: no-preference){
    .leaf-pop, .blossom, .seedling{ transition:transform .9s cubic-bezier(.22,.68,.32,1), opacity .7s ease; }
    .deco, .sun-core{ transition:transform 1s cubic-bezier(.22,.68,.32,1), opacity .8s ease; }
    .ray{ transition:transform .9s cubic-bezier(.22,.68,.32,1), opacity .7s ease; }
    .branch{ transition:stroke-dashoffset 1s cubic-bezier(.32,.62,.3,1), opacity .5s ease; }
    .tree-group{ transition:transform 1.15s cubic-bezier(.25,.6,.3,1); }
    .sun-core{ transition:transform 1s ease, opacity .8s ease, r .9s ease; }
    .canopy{ animation:sway 8s ease-in-out infinite; transform-origin:300px 500px; }
    @keyframes sway{ 0%,100%{transform:rotate(-.8deg);} 50%{transform:rotate(.8deg);} }
    .leaf-wiggle{ transform-box:fill-box; transform-origin:50% 100%; }
    .shown.leaf-pop .leaf-wiggle{ animation:leaf-breeze 2.5s ease-in-out infinite; }
    @keyframes leaf-breeze{ 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }
  }
  .shown.leaf-pop, .shown.deco, .shown.ray, .shown.blossom, .shown.sun-core, .shown.seedling{ transform:scale(1); opacity:1; }
  .shown.branch{ stroke-dashoffset:0; opacity:1; }

  .status{ margin:4px 0 2px; font-family:'Fraunces',Georgia,serif; font-size:1.77rem; font-weight:500; color:var(--ink); min-height:1.4em; }
  .status b{ color:inherit; font-weight:600; }
  .livenote{ margin:0 0 2px; font-size:1.275rem; color:#0d2218; font-weight:400; letter-spacing:.02em; }

  @media (max-height: 920px) and (min-width: 521px) {
    .screen{ padding:12px 18px 12px; }
    .eyebrow{ font-size:1rem; }
    .title{ font-size:clamp(1.8rem, 6.6vw, 2.5rem); }
    .subtitle{ font-size:1.14rem; min-height:5rem; }
    .subtitle.final{ font-size:1.26rem; }
    .status{ font-size:1.42rem; }
    .livenote{ font-size:1rem; }
    .stage{ height:min(62vh,420px); margin-top:30px; }
  }

  @media (max-width: 520px) {
    .screen{ padding:12px 18px 12px; }
    .eyebrow{ font-size:.98rem; }
    .title{ font-size:clamp(2.1rem, 6.5vw, 2.7rem); }
    .subtitle{ font-size:1.08rem; min-height:5rem; }
    .subtitle.final{ font-size:1.18rem; }
    .status{ font-size:1.35rem; }
    .livenote{ font-size:.98rem; }
    .stage{ height:min(63vh,460px); margin-top:4px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="screen">
    <header>
      <p class="eyebrow" id="eyebrow">NDT</p>
      <h1 class="title">Our testing tree</h1>
      <p class="subtitle" id="subtitle">The tree grows as the team submits their feedback forms. Watch it flourish together.</p>
    </header>

    <main class="stage" aria-live="polite">
      <svg id="tree" viewBox="40 30 520 555" preserveAspectRatio="xMidYMax meet" role="img" aria-label="A growing tree showing the team's collective progress"></svg>
    </main>

    <p id="status" class="status">&nbsp;</p>
    <p class="livenote">Refresh your browser to see the latest count.</p>
  </div>
</div>

<script>
(function(){
  "use strict";

  // Edit these two numbers, then commit + push.
  var COUNT = 1;   // total forms submitted so far
  var GOAL  = 35;  // forms required for a full tree

  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  var rnd = mulberry32(20260610);
  function rr(mn,mx){ return mn+(mx-mn)*rnd(); }

  // ---- build tree geometry ----
  var BASE_X=300, BASE_Y=500, maxDepth=4;
  var branches=[], leafSlots=[];

  function grow(x,y,angle,len,w,depth){
    var x2=x+len*Math.sin(angle), y2=y-len*Math.cos(angle);
    branches.push({x1:x,y1:y,x2:x2,y2:y2,w:w,depth:depth});
    var bi = branches.length-1;
    if(depth===0){
      leafSlots.push({ x:x2, y:y2, ang:angle, scale:rr(.7,1.05), kind: rnd()<.75?"sage":"gold", bi:bi });
      var side=rnd()<.5?1:-1;
      leafSlots.push({ x:x+(x2-x)*rr(.35,.85), y:y+(y2-y)*rr(.35,.85), ang:angle+side*rr(.5,1.15), scale:rr(.6,.95), kind: rnd()<.75?"sage":"gold", bi:bi });
    } else if(depth===1){
      var side=rnd()<.5?1:-1;
      leafSlots.push({ x:x+(x2-x)*rr(.45,.9), y:y+(y2-y)*rr(.45,.9), ang:angle+side*rr(.5,1.1), scale:rr(.6,.88), kind: rnd()<.72?"sage":"gold", bi:bi });
    }
    if(depth>0){
      var bc = depth>=3 ? 2 : 3;
      var baseSpread = depth>=2 ? rr(.52,.74) : rr(.70,.95);
      for(var b=0;b<bc;b++){
        var off=(b-(bc-1)/2);
        var lean = depth<=1 ? off*rr(.14,.28) : 0;
        var branchAngle = angle + off*baseSpread + lean + rr(-.13,.13);
        var branchLen = len * rr(.60,.80);  // wider length variance = more ragged top
        grow(x2,y2, branchAngle, branchLen, w*0.63, depth-1);
      }
    }
  }

  // trunk: a single straight main stem to a fork point
  var trunkOff = rr(-6,6), trunkTilt = rr(-.03,.03);
  var trunkLen = 160;
  var forkX = BASE_X+trunkOff + trunkLen*Math.sin(trunkTilt);
  var forkY = BASE_Y - trunkLen*Math.cos(trunkTilt);
  branches.push({x1:BASE_X+trunkOff, y1:BASE_Y, x2:forkX, y2:forkY, w:20, depth:maxDepth+1});

  // 4–5 primary branches off the trunk at varied heights, spread wide
  var nMain = 5;
  var mainDefs = [
    { t:0.45, ang: rr(-.55,-.35), lenMul: rr(.82,.98) },  // left low
    { t:0.65, ang: rr( .38, .58), lenMul: rr(.80,.95) },  // right mid
    { t:0.80, ang: rr(-.48,-.28), lenMul: rr(.75,.90) },  // left mid-high
    { t:0.92, ang: rr( .28, .50), lenMul: rr(.72,.88) },  // right high
    { t:1.00, ang: rr(-.15, .15), lenMul: rr(.70,.85) },  // centre top
  ];
  mainDefs.forEach(function(def){
    var px = BASE_X+trunkOff + (forkX-(BASE_X+trunkOff))*def.t;
    var py = BASE_Y + (forkY-BASE_Y)*def.t;
    var primaryLen = 110 * def.lenMul;
    grow(px, py, def.ang + trunkTilt + rr(-.06,.06), primaryLen, 11, maxDepth-1);
  });

  // thresholds computed below as an even, growth-ordered reveal

  // thresholds: structure builds inner -> outer across most of the journey
  branches.forEach(function(br){ br.len = Math.hypot(br.x2-br.x1, br.y2-br.y1); });

  // Even, growth-ordered reveal: trunk first, then outward tier by tier,
  // each branch immediately followed by its own leaves (so leaves never float).
  var TREE_END = 1.0;   // the whole submission count grows the tree; sky is a finale after
  var leavesByBranch={};
  leafSlots.forEach(function(lf){ (leavesByBranch[lf.bi]=leavesByBranch[lf.bi]||[]).push(lf); });
  var border = branches.map(function(_,i){ return i; }).sort(function(a,b){
    var ta=maxDepth-branches[a].depth, tb=maxDepth-branches[b].depth; return ta-tb || a-b;
  });
  var order=[];
  border.forEach(function(i){
    order.push(branches[i]);
    (leavesByBranch[i]||[]).forEach(function(lf){ order.push(lf); });
  });
  var M=order.length;
  order.forEach(function(it,i){ it.th = Math.pow(M>1 ? i/(M-1) : 0, 1/3) * TREE_END; });

  // sky decorations appear only after the tree is established (back half)
  var decos=[];
  [["star",120,120,15],["star",480,110,15],["star",300,60,13],
   ["plus",80,230,9],["plus",520,220,9],["plus",170,70,7],["plus",430,75,7],
   ["spark",240,95,7],["spark",365,130,7],["spark",95,300,7],["spark",505,300,7],
   ["spark",60,160,6],["spark",540,165,6],["star",55,90,11],["star",548,85,11]
  ].forEach(function(d){ decos.push({type:d[0],x:d[1],y:d[2],s:d[3], th:0.84+rr(0,.16)}); });

  // sun rays (also held back)
  var RAYS=13, rays=[];
  for(var r=0;r<RAYS;r++){ rays.push({ a:(-Math.PI*0.5)+(r/(RAYS-1)-.5)*Math.PI*0.9, th:0.85 + (r/(RAYS-1))*0.15 }); }

  // ---- svg helpers ----
  var NS="http://www.w3.org/2000/svg";
  function el(n,a){ var e=document.createElementNS(NS,n); for(var k in a){ e.setAttribute(k,a[k]); } return e; }
  function starPts(cx,cy,o,inn,p){ var s=[],st=Math.PI/p; for(var i=0;i<p*2;i++){ var rad=i%2===0?o:inn, an=i*st-Math.PI/2; s.push((cx+rad*Math.cos(an)).toFixed(2)+","+(cy+rad*Math.sin(an)).toFixed(2)); } return s.join(" "); }

  var svg=document.getElementById("tree");
  var leafEls=[], branchEls=[], decoEls=[], rayEls=[], blossomEls=[];
  var sunCore, treeG;

  function build(){
    var defs=el("defs",{});
    var cp=el("clipPath",{id:"skyclip"});
    cp.appendChild(el("rect",{x:-100,y:-100,width:800,height:600})); // sky only: y from -100 down to 500
    defs.appendChild(cp); svg.appendChild(defs);

    // decorations (behind)
    var gDeco=el("g",{});
    decos.forEach(function(d){
      var node;
      if(d.type==="star"){ node=el("polygon",{points:starPts(d.x,d.y,d.s,d.s*0.42,8), fill:"var(--gold)", stroke:"var(--ink)","stroke-width":2,"stroke-linejoin":"round"}); }
      else if(d.type==="plus"){ var s=d.s,t=s*0.34; node=el("path",{d:"M"+(d.x-t)+","+(d.y-s)+" h"+(2*t)+" v"+(s-t)+" h"+(s-t)+" v"+(2*t)+" h"+(-(s-t))+" v"+(s-t)+" h"+(-2*t)+" v"+(-(s-t))+" h"+(-(s-t))+" v"+(-2*t)+" h"+(s-t)+" Z", fill:"var(--orange)", stroke:"var(--ink)","stroke-width":1.5,"stroke-linejoin":"round"}); }
      else { node=el("path",{d:"M"+d.x+","+(d.y-d.s)+" Q"+d.x+","+d.y+" "+(d.x+d.s)+","+d.y+" Q"+d.x+","+d.y+" "+d.x+","+(d.y+d.s)+" Q"+d.x+","+d.y+" "+(d.x-d.s)+","+d.y+" Q"+d.x+","+d.y+" "+d.x+","+(d.y-d.s)+" Z", fill:"var(--gold)"}); }
      node.setAttribute("class","deco");
      node.style.setProperty("--ox", d.x+"px"); node.style.setProperty("--oy", d.y+"px");
      gDeco.appendChild(node); decoEls.push({node:node, th:d.th});
    });
    svg.appendChild(gDeco);

    // sun (clipped to the sky so nothing shows below the ground line)
    var gSun=el("g",{"clip-path":"url(#skyclip)"});
    var gRays=el("g",{});
    rays.forEach(function(ray){
      var inner=58,outer=104,hw=0.05;
      var x1=BASE_X+inner*Math.cos(ray.a), y1=BASE_Y+inner*Math.sin(ray.a);
      var xa=BASE_X+outer*Math.cos(ray.a-hw), ya=BASE_Y+outer*Math.sin(ray.a-hw);
      var xb=BASE_X+outer*Math.cos(ray.a+hw), yb=BASE_Y+outer*Math.sin(ray.a+hw);
      var ry=el("polygon",{points:[x1.toFixed(1)+","+y1.toFixed(1),xa.toFixed(1)+","+ya.toFixed(1),xb.toFixed(1)+","+yb.toFixed(1)].join(" "), fill:"var(--orange-soft)", stroke:"var(--ink)","stroke-width":1.5,"stroke-linejoin":"round","class":"ray"});
      ry.style.setProperty("--ox",BASE_X+"px"); ry.style.setProperty("--oy",BASE_Y+"px");
      gRays.appendChild(ry); rayEls.push({node:ry, th:ray.th});
    });
    sunCore=el("circle",{cx:BASE_X,cy:BASE_Y,r:46, fill:"var(--orange)", stroke:"var(--ink)","stroke-width":3,"class":"sun-core"});
    sunCore.style.setProperty("--ox",BASE_X+"px"); sunCore.style.setProperty("--oy",BASE_Y+"px");
    gSun.appendChild(gRays); gSun.appendChild(sunCore); svg.appendChild(gSun);

    // ground
    svg.appendChild(el("path",{d:"M0,500 Q300,486 600,500 L600,560 L0,560 Z", fill:"var(--ink)"}));
    svg.appendChild(el("path",{d:"M0,500 Q300,486 600,500", fill:"none", stroke:"var(--orange)","stroke-width":4,"stroke-linecap":"round"}));

    // tree (the trunk itself is the sprout at count 0, so 0->1 reads as growth, not a swap)
    treeG=el("g",{"class":"tree-group"});
    var canopy=el("g",{"class":"canopy"});
    branches.sort(function(a,b){ return b.depth-a.depth; });
    branches.forEach(function(br){
      // gentle curve: control point bows perpendicular to the branch, random side
      var mx=(br.x1+br.x2)/2, my=(br.y1+br.y2)/2;
      var dx=br.x2-br.x1, dy=br.y2-br.y1;
      var bow = rr(0.06,0.18) * br.len * (rnd()<.5?1:-1);
      var cx=(mx - dy*bow/br.len).toFixed(1), cy=(my + dx*bow/br.len).toFixed(1);
      var d="M"+br.x1.toFixed(1)+","+br.y1.toFixed(1)+" Q"+cx+","+cy+" "+br.x2.toFixed(1)+","+br.y2.toFixed(1);
      var path=el("path",{d:d, stroke:"var(--ink)","stroke-width":Math.max(1.8,br.w).toFixed(1),"stroke-linecap":"round", fill:"none","class":"branch"});
      path.style.setProperty("--len", (br.len*1.35).toFixed(1)); canopy.appendChild(path); branchEls.push({node:path, th:br.th});
    });
    leafSlots.forEach(function(lf){
      var g=el("g",{transform:"translate("+lf.x.toFixed(1)+","+lf.y.toFixed(1)+") rotate("+(lf.ang*180/Math.PI).toFixed(1)+")"});
      var pop=el("g",{"class":"leaf-pop"});
      var wiggle=el("g",{"class":"leaf-wiggle"});
      wiggle.style.animationDelay = "-"+rr(0,2.5).toFixed(2)+"s";
      var L=30*lf.scale, W=12*lf.scale, fill=lf.kind==="gold"?"var(--gold)":"var(--sage)";
      wiggle.appendChild(el("path",{d:"M0,0 Q"+W+","+(-L*0.5)+" 0,"+(-L)+" Q"+(-W)+","+(-L*0.5)+" 0,0 Z", fill:fill, stroke:"var(--ink)","stroke-width":1.8,"stroke-linejoin":"round"}));
      wiggle.appendChild(el("path",{d:"M0,-1 L0,"+(-L*0.92), stroke:"var(--ink)","stroke-width":1.1, fill:"none","stroke-linecap":"round","opacity":.65}));
      for(var v=1;v<=3;v++){ var vy=-L*(0.22*v+0.12), vw=W*(0.85-v*0.18);
        wiggle.appendChild(el("path",{d:"M0,"+vy.toFixed(1)+" L"+vw.toFixed(1)+","+(vy-5).toFixed(1), stroke:"var(--ink)","stroke-width":.9, fill:"none","stroke-linecap":"round","opacity":.5}));
        wiggle.appendChild(el("path",{d:"M0,"+vy.toFixed(1)+" L"+(-vw).toFixed(1)+","+(vy-5).toFixed(1), stroke:"var(--ink)","stroke-width":.9, fill:"none","stroke-linecap":"round","opacity":.5})); }
      pop.appendChild(wiggle);
      g.appendChild(pop); canopy.appendChild(g); leafEls.push({node:pop, th:lf.th});

      var bg=el("g",{transform:"translate("+lf.x.toFixed(1)+","+lf.y.toFixed(1)+")"});
      var bl=el("g",{"class":"blossom"});
      bl.appendChild(el("polygon",{points:starPts(0,0,11*lf.scale,4.6*lf.scale,8), fill:"var(--orange)", stroke:"var(--ink)","stroke-width":1.6,"stroke-linejoin":"round"}));
      bl.appendChild(el("circle",{cx:0,cy:0,r:3.2*lf.scale, fill:"var(--gold)", stroke:"var(--ink)","stroke-width":1.2}));
      bg.appendChild(bl); canopy.appendChild(bg); blossomEls.push({node:bl});
    });
    treeG.appendChild(canopy); svg.appendChild(treeG);
  }

  // ---- apply state with smooth staggered reveal ----
  function applyState(count, goal){
    var p = Math.max(0, Math.min(1, count/Math.max(1,goal)));
    var struct = count===0 ? 0 : p;   // trunk (threshold 0) shows even at zero, as the sprout

    // suppress transitions on initial paint so the trunk just appears (no draw-in animation)
    if(count===0){
      branchEls.forEach(function(o){ o.node.style.transition="none"; });
      leafEls.forEach(function(o){ o.node.style.transition="none"; });
    } else {
      branchEls.forEach(function(o){ o.node.style.transition=""; });
      leafEls.forEach(function(o){ o.node.style.transition=""; });
    }

    // branches
    var newB=[];
    branchEls.forEach(function(o){ var show=struct>=o.th; if(show && !o.node.classList.contains("shown")) newB.push(o); });
    newB.sort(function(a,b){ return a.th-b.th; });
    branchEls.forEach(function(o){ var show=struct>=o.th; var k=newB.indexOf(o); o.node.style.transitionDelay = k>=0 ? (k*0.05)+"s" : "0s"; o.node.classList.toggle("shown", show); });

    // leaves (gentle cascade)
    var newL=[];
    leafEls.forEach(function(o){ var show=count>0 && p>=o.th; if(show && !o.node.classList.contains("shown")) newL.push(o); });
    newL.sort(function(a,b){ return a.th-b.th; });
    leafEls.forEach(function(o){ var show=count>0 && p>=o.th; var k=newL.indexOf(o); o.node.style.transitionDelay = k>=0 ? (0.08 + k*0.06)+"s" : "0s"; o.node.classList.toggle("shown", show); });

    // background = a celebratory finale that appears once every submission is in
    var done = count>=goal;
    if(sunCore){
      if(done && !sunCore.classList.contains("shown")) sunCore.style.transitionDelay="0s";
      if(!done) sunCore.style.transitionDelay="0s";
      sunCore.setAttribute("r",(40+26*Math.min(p,1)).toFixed(1));
      sunCore.classList.toggle("shown", done);
    }
    rayEls.forEach(function(o,i){
      if(done && !o.node.classList.contains("shown")) o.node.style.transitionDelay=(0.15+i*0.035)+"s";
      else if(!done) o.node.style.transitionDelay="0s";
      o.node.classList.toggle("shown", done);
    });
    decoEls.forEach(function(o,i){
      if(done && !o.node.classList.contains("shown")) o.node.style.transitionDelay=(0.5+i*0.05)+"s";
      else if(!done) o.node.style.transitionDelay="0s";
      o.node.classList.toggle("shown", done);
    });

    // blossoms on overshoot
    var over=Math.max(0,count-goal), nb=Math.min(over,blossomEls.length);
    blossomEls.forEach(function(o,i){ o.node.classList.toggle("shown", i>=(blossomEls.length-nb)); });

    // size: small plant -> full tree by TREE_END, then steady while the sky fills in
    var scale=0.25+0.75*Math.min(p/TREE_END,1);
    if(treeG){ treeG.style.transform="translate("+BASE_X+"px,"+BASE_Y+"px) scale("+scale.toFixed(3)+") translate("+(-BASE_X)+"px,"+(-BASE_Y)+"px)"; }

    var status=document.getElementById("status");
    if(count<goal){ status.innerHTML="<b style='color:var(--orange)'>"+count+"</b> of "+goal+" forms."; status.style.color=""; }
    else { status.innerHTML="<b>"+goal+"</b> of "+goal+" forms &mdash; <b>Complete!</b>"; status.style.color="var(--sage-deep)"; }

    var sub=document.getElementById("subtitle");
    if(sub){
      if(count>=goal){ sub.innerHTML="In full leaf!<br>Thank you for your invaluable support."; sub.classList.add("final"); }
      else { sub.textContent="The tree grows as the team submits their feedback forms. Watch it flourish together."; sub.classList.remove("final"); }
    }
  }

  // current day heading, refreshed daily (uses each viewer's local date)
  function updateDay(){
    var e=document.getElementById("eyebrow"); if(!e) return;
    try{ e.textContent = new Date().toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long"}); }
    catch(err){ e.textContent = new Date().toDateString(); }
  }

  build();
  updateDay();
  setInterval(updateDay, 60000);
  applyState(0, GOAL);
  if(COUNT > 0){
    var displayed = 0;
    var tickMs = Math.min(120, Math.max(50, Math.round(1500 / COUNT)));
    setTimeout(function(){
      var iv = setInterval(function(){
        displayed++;
        applyState(displayed, GOAL);
        if(displayed >= COUNT) clearInterval(iv);
      }, tickMs);
    }, 300);
  }
})();
</script>
</body>
</html>
